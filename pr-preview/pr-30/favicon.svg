<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Left ear (behind head) -->
  <ellipse cx="28" cy="28" rx="13" ry="21" fill="#DDD0BC" transform="rotate(-15 28 28)" />
  <!-- Right ear (behind head) -->
  <ellipse cx="72" cy="28" rx="13" ry="21" fill="#DDD0BC" transform="rotate(15 72 28)" />
  <!-- Head -->
  <circle cx="50" cy="50" r="36" fill="#F5EFE2" />
  <!-- Left eye -->
  <circle cx="37" cy="45" r="5" fill="#2C3E50" />
  <!-- Right eye -->
  <circle cx="63" cy="45" r="5" fill="#2C3E50" />
  <!-- Eye shine left -->
  <circle cx="39" cy="43" r="1.8" fill="white" />
  <!-- Eye shine right -->
  <circle cx="65" cy="43" r="1.8" fill="white" />
  <!-- Nose -->
  <ellipse cx="50" cy="56" rx="5" ry="3.5" fill="#2C3E50" />
  <!-- Smile -->
  <path d="M 43 64 Q 50 70 57 64" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round" />
</svg>